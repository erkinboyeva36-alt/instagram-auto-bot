name: Instagram Auto Post

on:
  schedule:
    # Har kuni soat 9:00 UTC (O'zbekistonda 14:00)
    - cron: '0 9 * * *'
    
    # Har kuni soat 15:00 UTC (O'zbekistonda 20:00) - story uchun
    - cron: '0 15 * * *'
    
    # Har kuni soat 21:00 UTC (O'zbekistonda 02:00 ertasi) - story uchun
    - cron: '0 21 * * *'
  
  # Qo'lda ishga tushirish uchun (test qilish)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Repo'ni yuklash
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # 2. Python o'rnatish
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # 3. Kutubxonalar o'rnatish
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    # 4. Avvalgi session'ni yuklash (agar bo'lsa)
    - name: Download previous session
      uses: dawidd6/action-download-artifact@v3
      with:
        name: instagram-session
        path: .
        if_no_artifact_found: warn
    
    # 5. Botni ishga tushirish
    - name: Run Instagram Bot
      env:
        INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      run: |
        python instagram_bot.py
    
    # 6. Session'ni saqlash (keyingi safar uchun)
    - name: Upload session
      uses: actions/upload-artifact@v4
      with:
        name: instagram-session
        path: session.json
        retention-days: 30
